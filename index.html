<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Tarot Reader</title>

    <!-- App Icon (Favicon) RESTORED -->
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔮</text></svg>"
    />

    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Forcing Tailwind to use Sarabun globally so it never gets overridden -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Sarabun", "sans-serif"],
            },
          },
        },
      };
    </script>

    <!-- Official Sarabun Font (Web equivalent of TH Sarabun PSK) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <!-- Firebase Analytics & Remote Config Integration -->
    <script type="module" src="public/scripts/firebase.js"></script>

    <link rel="stylesheet" href="publiccss/style.css" />
  </head>
  <body>
    <div id="app-container">
      <!-- TOP CONTROL BAR -->
      <header
        class="sticky top-0 flex-none bg-slate-900/95 backdrop-blur-md border-b border-amber-900/40 shadow-[0_4px_30px_rgba(0,0,0,0.6)] z-50 pt-5 pb-4 px-4 md:px-8"
      >
        <!-- Bilingual Toggle (EN / TH) -->
        <div
          class="absolute top-4 right-4 md:right-8 flex items-center gap-2 z-50"
        >
          <span class="text-xs font-bold text-slate-400" id="lbl-en">EN</span>
          <div
            class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in"
          >
            <input
              type="checkbox"
              name="toggle-lang"
              id="toggle-lang"
              class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 border-slate-700 appearance-none cursor-pointer z-10 transition-transform duration-300 ease-in-out"
            />
            <label
              for="toggle-lang"
              class="toggle-label block overflow-hidden h-5 rounded-full bg-slate-700 cursor-pointer"
            ></label>
          </div>
          <span class="text-xs font-bold text-slate-400" id="lbl-th">TH</span>
        </div>

        <div class="max-w-6xl mx-auto flex flex-col gap-5">
          <h1
            class="text-2xl md:text-3xl text-center font-bold tarot-font tracking-[0.2em] text-transparent bg-clip-text bg-gradient-to-r from-amber-200 via-amber-400 to-amber-200 drop-shadow-md"
            data-i18n="title"
          >
            ✧ DIGITAL TAROT ✧
          </h1>

          <!-- Controls Row 1 -->
          <div
            class="flex flex-wrap items-center justify-center gap-x-6 gap-y-4"
          >
            <div class="flex items-center gap-2">
              <label
                for="spread-select"
                class="text-xs text-amber-200/70 tarot-font tracking-widest uppercase"
                data-i18n="spread"
                >Spread</label
              >
              <select
                id="spread-select"
                class="custom-select bg-slate-800/80 text-amber-100 border border-amber-700/50 rounded-full pl-4 pr-8 h-9 text-sm focus:outline-none focus:border-amber-400 shadow-inner transition-all hover:bg-slate-800 cursor-pointer w-48 md:w-64 truncate"
              >
                <!-- Injected via JS -->
              </select>
            </div>

            <div class="h-5 w-px bg-amber-700/30 hidden md:block"></div>

            <div class="flex items-center gap-2">
              <span
                class="text-xs text-amber-200/70 tarot-font tracking-widest uppercase"
                data-i18n="status"
                >Status</span
              >
              <div
                class="h-9 flex items-center justify-center bg-slate-800/50 px-4 rounded-full border border-slate-700 min-w-[120px]"
              >
                <span
                  id="status-text"
                  class="text-sm font-semibold text-amber-50 whitespace-nowrap"
                ></span>
              </div>
            </div>
          </div>

          <!-- Focus Row (Hidden on 1-card) -->
          <div
            id="focus-container"
            class="flex flex-wrap items-center justify-center gap-x-4 gap-y-4 hidden"
          >
            <label
              class="text-xs text-amber-200/70 tarot-font tracking-widest uppercase"
              data-i18n="focus"
              >Focus</label
            >

            <select
              id="focus-category"
              class="custom-select bg-slate-800/80 text-amber-100 border border-amber-700/50 rounded-full pl-4 pr-8 h-9 text-sm focus:outline-none cursor-pointer w-40 truncate"
            >
              <!-- Injected via JS -->
            </select>

            <select
              id="focus-specific"
              class="custom-select bg-slate-800/80 text-amber-100 border border-amber-700/50 rounded-full pl-4 pr-8 h-9 text-sm focus:outline-none cursor-pointer w-48 truncate"
            >
              <!-- Injected via JS -->
            </select>

            <!-- Custom Question Input (Hidden by default) -->
            <div
              id="custom-question-container"
              class="flex items-center gap-2 hidden"
            >
              <input
                type="text"
                id="custom-question-input"
                placeholder="Type your question..."
                class="bg-slate-800/80 text-amber-100 border border-amber-700/50 rounded-full px-4 h-9 text-sm focus:outline-none focus:border-amber-400 w-48 md:w-64"
                data-i18n-placeholder="customPlaceholder"
              />
              <button
                id="btn-set-custom"
                class="bg-amber-600/20 text-amber-400 border border-amber-600 rounded-full px-3 h-9 text-xs font-bold hover:bg-amber-600 hover:text-white transition-colors"
                data-i18n="set"
              >
                Set
              </button>
            </div>
          </div>

          <!-- Controls Row 2 -->
          <div
            class="flex flex-wrap items-center justify-center gap-x-6 gap-y-4 mt-2"
          >
            <!-- Art Toggle -->
            <div
              id="art-toggle-wrapper"
              class="flex items-center gap-3 bg-slate-800/50 px-4 h-9 rounded-full border border-slate-700 transition-all"
            >
              <span
                class="text-[0.65rem] font-bold text-slate-400 tracking-wider"
                data-i18n="modern"
                >MODERN</span
              >
              <div
                class="relative inline-block w-10 align-middle select-none transition duration-200 ease-in"
              >
                <input
                  type="checkbox"
                  name="toggle"
                  id="toggle-art"
                  class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 border-slate-700 appearance-none cursor-pointer z-10 transition-transform duration-300 ease-in-out"
                />
                <label
                  for="toggle-art"
                  class="toggle-label block overflow-hidden h-5 rounded-full bg-slate-700 cursor-pointer"
                ></label>
              </div>
              <span
                class="text-[0.65rem] font-bold text-slate-400 tracking-wider"
                data-i18n="classic"
                >CLASSIC</span
              >
            </div>

            <button
              id="btn-history"
              class="tarot-font flex items-center justify-center tracking-wider text-xs uppercase px-5 h-9 rounded-full border border-indigo-500/50 text-indigo-300 hover:bg-indigo-500/20 hover:text-indigo-200 hover:border-indigo-400 transition-all"
              data-i18n="historyBtn"
            >
              History
            </button>
            <button
              id="btn-shuffle"
              class="tarot-font flex items-center justify-center gap-2 tracking-wider text-xs uppercase px-6 h-9 rounded-full border border-amber-500 text-amber-400 hover:bg-amber-500 hover:text-slate-900 transition-all shadow-[0_0_10px_rgba(245,158,11,0.2)] font-bold"
            >
              <span>✨</span> <span data-i18n="shuffleBtn">Shuffle</span>
            </button>
            <button
              id="btn-reset"
              class="tarot-font flex items-center justify-center tracking-wider text-xs uppercase px-5 h-9 rounded-full border border-slate-600 text-slate-300 hover:bg-slate-700 hover:text-white transition-all"
              data-i18n="resetBtn"
            >
              Reset
            </button>
          </div>
        </div>
      </header>

      <!-- SPREAD DISPLAY AREA -->
      <main
        class="w-full flex-grow p-4 md:p-8 flex items-start justify-center relative mt-8"
      >
        <div id="spread-area" class="spread-layout spread-1">
          <!-- Placeholders injected via JS -->
        </div>
      </main>

      <!-- DECK AREA -->
      <footer
        class="fixed bottom-0 left-0 w-full h-[280px] z-40 pointer-events-none"
        id="deck-area"
      >
        <div class="fan-container pointer-events-auto" id="fan-container"></div>
      </footer>
    </div>

    <!-- Giant Animated Broom Container -->
    <div
      id="broom-container"
      class="fixed inset-0 pointer-events-none z-[200] hidden overflow-hidden flex items-center justify-center"
    >
      <div
        id="sweeping-broom"
        class="absolute text-[15rem] md:text-[20rem] filter drop-shadow-2xl"
        style="transform: translate(100vw, -10vh)"
      >
        🧹
      </div>
    </div>

    <!-- Summoning Download Modal -->
    <div
      id="download-modal"
      class="fixed inset-0 bg-slate-950/95 backdrop-blur-xl z-[300] hidden flex-col items-center justify-center p-4"
    >
      <div
        class="text-6xl animate-pulse filter drop-shadow-[0_0_20px_rgba(167,139,250,0.8)] mb-6"
      >
        🔮
      </div>
      <h2
        class="text-2xl tarot-font text-amber-400 font-bold tracking-[0.2em] mb-8 text-center"
        data-i18n="summoning"
      >
        Summoning Ancient Visions
      </h2>
      <div
        class="w-full max-w-md bg-slate-800 rounded-full h-3 border border-slate-600 overflow-hidden"
      >
        <div
          id="download-progress-bar"
          class="bg-gradient-to-r from-amber-400 to-purple-500 h-full w-0 transition-all duration-300"
        ></div>
      </div>
      <div
        id="download-text"
        class="text-slate-400 mt-4 font-bold text-sm tracking-widest"
      >
        0%
      </div>
    </div>

    <!-- Funny Warning Modal -->
    <div
      id="funny-warning"
      class="fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-red-900/90 border-2 border-red-500 text-white px-8 py-6 rounded-2xl shadow-[0_0_50px_rgba(239,68,68,0.6)] z-[100] opacity-0 pointer-events-none flex flex-col items-center gap-3 backdrop-blur-md"
    >
      <div class="text-4xl">🛑</div>
      <div
        id="warning-text"
        class="text-xl font-bold text-center tarot-font tracking-wide"
      ></div>
    </div>

    <!-- History Modal -->
    <div
      id="history-modal"
      class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-[100] hidden items-center justify-center p-4"
    >
      <div
        class="bg-slate-900 border border-slate-700 rounded-xl shadow-2xl w-full max-w-5xl max-h-[80vh] flex flex-col"
      >
        <div
          class="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-900/50 rounded-t-xl"
        >
          <h2
            class="text-2xl tarot-font text-amber-400 font-bold"
            data-i18n="historyTitle"
          >
            Reading History
          </h2>
          <button
            id="close-history"
            class="text-slate-400 hover:text-white text-3xl leading-none"
          >
            &times;
          </button>
        </div>
        <div class="p-6 overflow-y-auto flex-1">
          <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
              <thead>
                <tr
                  class="border-b border-slate-700 text-slate-400 text-sm uppercase tracking-wider"
                >
                  <th class="pb-3 pr-4 font-medium" data-i18n="thDate">
                    Date & Time
                  </th>
                  <th class="pb-3 pr-4 font-medium" data-i18n="thType">
                    Spread & Focus
                  </th>
                  <th class="pb-3 pr-4 font-medium" data-i18n="thCards">
                    Cards Drawn
                  </th>
                  <th
                    class="pb-3 pr-4 font-medium text-center"
                    data-i18n="thSnap"
                  >
                    Snapshot
                  </th>
                  <th class="pb-3 font-medium text-center" data-i18n="thAction">
                    Action
                  </th>
                </tr>
              </thead>
              <tbody id="history-table-body" class="text-sm"></tbody>
            </table>
            <div
              id="empty-history"
              class="text-center py-10 text-slate-500 italic hidden"
              data-i18n="noHistory"
            >
              No readings recorded yet.
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Image Preview Modal -->
    <div
      id="snapshot-modal"
      class="fixed inset-0 bg-slate-950/95 backdrop-blur-md z-[110] hidden flex-col items-center justify-center p-4"
    >
      <button
        id="close-snapshot"
        class="absolute top-6 right-8 text-slate-400 hover:text-white text-4xl leading-none"
      >
        &times;
      </button>
      <h2
        class="text-xl tarot-font text-amber-400 font-bold mb-6 tracking-widest"
        data-i18n="snapshotTitle"
      >
        Spread Snapshot
      </h2>
      <div
        class="relative max-w-5xl w-full flex justify-center overflow-auto max-h-[80vh]"
      >
        <img
          id="snapshot-image"
          src=""
          alt="Spread Snapshot"
          class="max-w-full h-auto rounded-xl shadow-[0_0_50px_rgba(251,191,36,0.15)] border border-slate-700"
        />
      </div>
    </div>

    <!-- Floating Interpret Button -->
    <button
      id="btn-interpret"
      class="fixed bottom-12 left-1/2 transform -translate-x-1/2 bg-gradient-to-r from-indigo-900 to-purple-900 border-2 border-amber-400 text-amber-200 tarot-font px-10 py-4 rounded-full shadow-[0_0_40px_rgba(139,92,246,0.6)] z-[60] opacity-0 pointer-events-none transition-all duration-500 scale-90 hidden hover:scale-105 hover:shadow-[0_0_60px_rgba(167,139,250,0.8)] font-bold text-lg"
    >
      ✨ <span data-i18n="revealBtn">Reveal the Meaning</span> ✨
    </button>

    <!-- AI Interpretation Modal -->
    <div
      id="interpret-modal"
      class="fixed inset-0 bg-slate-950/90 backdrop-blur-md z-[120] hidden items-center justify-center p-4"
    >
      <div
        class="bg-slate-900 border border-amber-700/50 rounded-2xl shadow-2xl w-full max-w-2xl max-h-[85vh] flex flex-col overflow-hidden relative"
      >
        <div
          class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-transparent via-amber-400 to-transparent"
        ></div>
        <div
          class="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-900/80"
        >
          <h2
            class="text-2xl tarot-font text-amber-400 font-bold tracking-widest"
            data-i18n="insightTitle"
          >
            Spiritual Insight
          </h2>
          <button
            id="close-interpret"
            class="text-slate-400 hover:text-amber-200 text-3xl leading-none transition-colors"
          >
            &times;
          </button>
        </div>
        <div
          class="p-8 overflow-y-auto flex-1 text-slate-300 leading-relaxed text-lg"
          id="interpret-content"
        ></div>
      </div>
    </div>

    <script src="public/scripts/script.js"></script>
  </body>
</html>
